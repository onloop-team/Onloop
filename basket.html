<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loop - Build your basket.</title>
    <meta
      name="description"
      content="Build your Loop basket of home essentials and send your order to WhatsApp for confirmation."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="images/favicon.ico" sizes="any" />
    <link rel="icon" href="images/favicon-32.png" type="image/png" />
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="index.html#top" aria-label="Loop home">
          <img
            class="brand-logo"
            src="images/loop-logo-transparent.png"
            alt="Loop - Never run out."
          />
        </a>
        <nav class="nav-links" aria-label="Primary navigation">
          <a href="index.html#how-it-works">How it works</a>
          <a href="#products">Products</a>
          <a href="index.html#faq">FAQ</a>
        </nav>
        <a class="nav-cta" href="#products">Start order</a>
      </header>

      <main id="top">
        <section class="section-pad products-section" id="products">
          <div class="products-layout">
            <div class="products-main">
              <div class="basket-controls">
                <label class="search-field" for="productSearch">
                  <input
                    id="productSearch"
                    type="search"
                    aria-label="Search products"
                    placeholder="Search rice, baby wipes, detergent..."
                    autocomplete="off"
                  />
                </label>

                <div
                  class="category-tabs"
                  id="categoryTabs"
                  aria-label="Product categories"
                ></div>
              </div>

              <div class="product-scroll">
                <div class="product-grid" id="productGrid"></div>
              </div>
            </div>

            <aside class="desktop-cart" aria-label="Cart summary">
              <div id="desktopCart"></div>
            </aside>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <div>
          <img
            class="footer-logo"
            src="images/loop-logo-transparent.png"
            alt="Loop - Never run out."
          />
        </div>
        <p>Home essentials ordered online, confirmed on WhatsApp.</p>
      </footer>
    </div>

    <div class="mobile-cart-bar" id="mobileCartBar"></div>

    <div
      class="modal-backdrop hidden"
      id="onboardingModal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="onboardingTitle"
    >
      <div class="onboarding-card">
        <button class="icon-button modal-close" id="skipOnboardingTop" aria-label="Close onboarding">
          x
        </button>
        <div class="onboarding-progress" id="onboardingProgress"></div>
        <div id="onboardingContent"></div>
        <div class="modal-actions">
          <button class="button button-primary" id="startShoppingButton">
            Start shopping
          </button>
        </div>
      </div>
    </div>

    <div
      class="modal-backdrop hidden"
      id="reviewModal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="reviewTitle"
    >
      <div class="review-panel">
        <div class="review-header">
          <div>
            <p class="eyebrow">Order review</p>
            <h2 id="reviewTitle">Review your basket</h2>
          </div>
          <button class="icon-button" id="closeReviewButton" aria-label="Close order review">
            x
          </button>
        </div>

        <div class="review-body">
          <section class="review-section">
            <h3>Your items</h3>
            <div id="reviewItems"></div>
          </section>

          <section class="review-section">
            <h3>Delivery rhythm</h3>
            <div class="recurrence-grid" id="recurrenceOptions"></div>
          </section>

          <section class="review-section">
            <h3>Your details</h3>
            <form class="checkout-form" id="checkoutForm" novalidate>
              <label>
                Full name
                <input name="fullName" type="text" autocomplete="name" required />
                <span class="field-error" data-error-for="fullName"></span>
              </label>
              <label>
                Phone number
                <input name="phone" type="tel" autocomplete="tel" required />
                <span class="field-error" data-error-for="phone"></span>
              </label>
              <label>
                Delivery area/location
                <input name="deliveryArea" type="text" required />
                <span class="field-error" data-error-for="deliveryArea"></span>
              </label>
              <label>
                Full delivery address
                <input name="address" type="text" />
              </label>
              <label>
                Preferred delivery day
                <input name="preferredDeliveryDay" type="text" placeholder="e.g. Saturday morning" />
              </label>
              <label class="form-wide">
                Additional note
                <textarea name="note" rows="3"></textarea>
              </label>
            </form>
          </section>
        </div>

        <div class="review-footer">
          <div>
            <span>Grand total</span>
            <strong id="reviewGrandTotal">NGN 0</strong>
          </div>
          <button class="button button-primary" id="checkoutButton">
            Checkout on WhatsApp
          </button>
          <p class="form-error" id="checkoutError" aria-live="polite"></p>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
